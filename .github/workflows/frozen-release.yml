name: WCT-2026.1 frozen release

on:
  push:
    branches: [main]
    paths:
      - "release/WCT-2026.1/**"
      - "Makefile"
      - "flake.nix"
      - ".dockerignore"
      - ".github/workflows/frozen-release.yml"
  pull_request:
    paths:
      - "release/WCT-2026.1/**"
      - "Makefile"
      - "flake.nix"
      - ".dockerignore"
      - ".github/workflows/frozen-release.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  reproduce:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: release/WCT-2026.1/requirements.lock
      - name: Install pinned Lean toolchain
        shell: bash
        run: |
          curl --fail --location --silent --show-error \
            https://raw.githubusercontent.com/leanprover/elan/6737edca3d2ca3dbaa1b47b87769b48b420633ae/elan-init.sh \
            --output /tmp/elan-init.sh
          sh /tmp/elan-init.sh -y --no-modify-path --default-toolchain leanprover/lean4:v4.23.0
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
      - name: Reproduce all frozen layers
        shell: bash
        run: |
          set +e
          make reproduce 2>&1 | tee frozen-release.log
          status=${PIPESTATUS[0]}
          exit "$status"
      - name: Upload release bundle and diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: WCT-2026.1-${{ github.sha }}
          if-no-files-found: error
          path: |
            frozen-release.log
            release-output/WCT-2026.1/

  docker:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Build frozen Docker environment
        run: make docker-build

  nix:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
      - name: Evaluate the pinned Nix environment
        run: nix flake check --no-build
      - name: Verify required tools from the dev shell
        run: nix develop --command bash -c 'python --version && git --version && make --version | head -1 && elan --version'
